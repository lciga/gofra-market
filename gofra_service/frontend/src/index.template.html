    <script>
      ;(function () {
        const INTERACTIVE_SELECTOR =
          'input, textarea, select, button, [contenteditable="true"], .allow-selection, [data-allow-selection="true"]';

        const isInteractiveTarget = function (target) {
          if (!target) {
            return false;
          }
          return Boolean(target.closest(INTERACTIVE_SELECTOR));
        };

        const blockClipboard = function (event) {
          if (isInteractiveTarget(event.target)) {
            return;
          }
          event.preventDefault();
          event.stopPropagation();
          return false;
        };

        const blockSelection = function () {
          const active = document.activeElement;
          if (isInteractiveTarget(active)) {
            return;
          }
          const selection = window.getSelection ? window.getSelection() : null;
          if (selection && selection.removeAllRanges) {
            selection.removeAllRanges();
          }
        };

        const initGuards = function () {
          const events = ['copy', 'cut', 'paste', 'contextmenu', 'selectstart', 'dragstart'];
          events.forEach(function (eventName) {
            document.addEventListener(eventName, blockClipboard, true);
          });

          document.addEventListener('selectionchange', blockSelection, true);

          document.addEventListener(
            'keydown',
            function (event) {
              if (isInteractiveTarget(event.target)) {
                return;
              }
              const forbiddenKeys = ['a', 'c', 'x', 's', 'p', 'u', 'i', 'j'];
              if ((event.ctrlKey || event.metaKey) && forbiddenKeys.includes(event.key.toLowerCase())) {
                blockClipboard(event);
              }

              if (event.key === 'PrintScreen') {
                blockClipboard(event);
              }
            },
            true
          );

          document.addEventListener(
            'gesturestart',
            function (event) {
              if (isInteractiveTarget(event.target)) {
                return;
              }
              blockClipboard(event);
            },
            true
          );
        };

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initGuards, { once: true, passive: false });
        } else {
          initGuards();
        }
      })();
